name: green-ops-lite
description: Energy-efficient data center optimization environment
version: "1.0"

observation_space:
  type: object
  properties:
    rack_temp:
      type: array
      items:
        type: number
    cpu_load:
      type: array
      items:
        type: number
    power_cost:
      type: number
    failed_fan:
      type: boolean
    step_count:
      type: integer
  required:
    - rack_temp
    - cpu_load
    - power_cost
    - failed_fan
    - step_count

action_space:
  type: string
  enum:
    - increase_cooling(0)
    - increase_cooling(1)
    - increase_cooling(2)
    - decrease_load(0)
    - decrease_load(1)
    - decrease_load(2)
    - migrate_jobs(0,1)
    - migrate_jobs(1,2)
    - migrate_jobs(2,0)

reward:
  type: number
  description: Continuous reward signal combining stability, uptime, and efficiency