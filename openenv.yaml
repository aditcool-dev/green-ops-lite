spec_version: 1
type: environment

name: "greenops-x"
description: "Multi-Agent Data Center Optimization with Thermal Cascade Physics and Hardware Failure"
version: "1.0.0"

runtime:
  language: python
  entrypoint: server.py

app:
  port: 7860

observation_space:
  type: object
  properties:
    rack_temp:
      type: array
      items:
        type: number
        minimum: 0
        maximum: 200
      description: "Temperature of racks 0, 1, and 2 in Celsius"
    cpu_load:
      type: array
      items:
        type: number
        minimum: 0.0
        maximum: 1.0
      description: "CPU load of racks 0, 1, and 2 (0.0 to 1.0)"
    power_cost:
      type: number
      minimum: 0.0
      maximum: 10.0
      description: "Current power cost multiplier (baseline 1.0)"
    failed_fan:
      type: boolean
      description: "If True, Rack 0 fan is broken causing rapid thermal cascade"
    step_count:
      type: integer
      minimum: 0
      description: "Current step number within the episode"
  required:
    - rack_temp
    - cpu_load
    - power_cost
    - failed_fan

action_space:
  type: string
  pattern: "^(increase_cooling\\([0-2]\\)|decrease_load\\([0-2]\\)|migrate_jobs\\(([0-2]),([0-2])\\))$"
  description: "Actions: increase_cooling(N), decrease_load(N), or migrate_jobs(SRC,DST)"

reward:
  type: number
  minimum: -1.0
  maximum: 2.0
  description: >
    Continuous reward combining three weighted components:
    - Thermal stability  (0.4 weight): penalty for high temperatures and cascade risk.
      Formula: 0.4 * avg(max(0, 1 - (temp - 60) / 20)) per rack
    - Energy efficiency  (0.3 weight): penalty for excessive cooling power usage.
      Formula: 0.3 * max(0, 1 - power_cost / 2)
    - Throughput         (0.3 weight): reward for keeping servers processing jobs.
      Formula: 0.3 * avg(cpu_load)
    Bonuses: +0.3 if easy task and all racks < 65C,
             +0.2 if hard task and all racks < 75C.
    Penalties: -0.3 if any rack > 90C, -0.01 per step taken.

tasks:
  - name: easy
    description: "Standard initial conditions. No hardware failure. rack_temp=[75,80,65], cpu_load=[0.7,0.9,0.5]"
    max_steps: 10
  - name: medium
    description: "Elevated temperatures and load. rack_temp=[78,75,70], cpu_load=[0.8,0.75,0.7]"
    max_steps: 10
  - name: hard
    description: "Fan failure on rack 0. Thermal cascade active: +3C/step on rack 0, +1.5C/step on rack 1. rack_temp=[82,78,72], cpu_load=[0.85,0.8,0.75]"
    max_steps: 15

evaluation:
  metric: grade_score
  higher_is_better: true
  score_range:
    minimum: 0.01
    maximum: 0.99
  formula: >
    0.4 * avg(max(0, 1 - (temp - 60) / 30)) per rack   [stability]
    + 0.3 * max(0, 1 - power_cost / 3)                 [efficiency]
    + 0.3 * avg(cpu_load)                               [throughput]
  baseline_scores:
    easy: 0.439
    medium: 0.413
    hard: 0.377
  post_finetuning_scores:
    easy: 0.501
    medium: 0.498
    hard: 0.476